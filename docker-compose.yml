version: "3.8"

services:
  mysql:
    image: mysql:8.0
    container_name: dekho_exam_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: dekho_exam
      MYSQL_USER: dekho_user
      MYSQL_PASSWORD: dekho_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

volumes:
  mysql_data:
